services:
  fe_acv:
    build: .
    container_name: fe_acv
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    networks:
      - acv-network

networks:
  acv-network:
    external: true
    name: acv-network
